<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Scales icon (天平/法槌意象) -->
  <g transform="translate(256,200)" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base -->
    <line x1="0" y1="80" x2="0" y2="50"/>
    <line x1="-30" y1="80" x2="30" y2="80"/>
    <!-- Beam -->
    <line x1="-80" y1="20" x2="80" y2="20"/>
    <!-- Center post -->
    <line x1="0" y1="20" x2="0" y2="50"/>
    <!-- Left scale -->
    <line x1="-80" y1="20" x2="-80" y2="45"/>
    <path d="M-100,45 L-60,45 L-50,55 L-110,55 Z" stroke-width="8"/>
    <!-- Right scale -->
    <line x1="80" y1="20" x2="80" y2="45"/>
    <path d="M60,45 L100,45 L110,55 L50,55 Z" stroke-width="8"/>
  </g>
  <!-- Text below -->
  <text x="256" y="360" text-anchor="middle" fill="#ffffff" font-size="48" font-weight="700" font-family="sans-serif">律</text>
</svg>
